description: "LLM Evaluation Demo - Prompt Comparison"

providers:
  - id: openai:gpt-4.1-mini

prompts:
  - file://prompts/promptA.txt
  - file://prompts/promptB.txt

tests:
  - vars:
      input: file://data/input.txt

    assert:
      # 1. Word Count Validation
      - type: javascript
        value: |
          const wordCount = output.split(/\s+/).length;
          return wordCount <= 80;

      # 2. Factual Correctness
      - type: llm-rubric
        value: |
          Original Text:
          {{input}}

          Summary:
          {{output}}
          Is the summary factually correct?
          Answer YES or NO and explain briefly.

      # 3. Hallucination Check
      - type: llm-rubric
        value: |
          Original Text:
          {{input}}

          Summary:
          {{output}}

          Does the summary contain any hallucinated or incorrect information?
          Answer YES or NO and explain.

      # 4. Context Preservation
      - type: llm-rubric
        value: |
          Original Text:
          {{input}}

          Summary:
          {{output}}

          Does the summary preserve the main idea and context?
          Answer YES or NO and explain.

      # 5. Overall Quality
      - type: llm-rubric
        value: |
          Original Text:
          {{input}}

          Summary:
          {{output}}

          Evaluate based on:
          - Coverage of key ideas
          - Clarity and structure
          - Conciseness
          - No hallucinations
          - Readability

          Return JSON:
          {
            "score": <number between 0 and 1>,
            "feedback": "<brief feedback>"
          }
        threshold: 0.7